name: build and upload release

on:
  release:
    types: [ published ]

jobs:
  build:
    name: build release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.14

      - name: Install pypa/build
        run: python -m pip install build "babel~=2.18"
      - name: Compile the translation
        run: python tools/compile.py
      - name: Build release
        run: python -m build -s -w

      - name: Upload release
        uses: actions/upload-artifact@v7
        with:
          name: release
          path: ./dist/
          retention-days: 1

  upload_gh:
    name: upload to GitHub Release
    runs-on: ubuntu-latest
    needs: [ build ]
    permissions:
      contents: write

    steps:
      - name: Download release
        uses: actions/download-artifact@v8
        with:
          name: release
          path: ./dist/

      - name: Add file to github release
        uses: cssnr/upload-release-action@v1
        with:
          globs: |
            ./dist/*.whl
            ./dist/*.tar.gz


  upload_pypi:
    name: upload to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    needs: [ build ]
    permissions:
      id-token: write

    steps:
      - name: Download release
        uses: actions/download-artifact@v8
        with:
          name: release
          path: ./dist/

      - name: Publish release to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        env:
          url: https://pypi.org/p/sphinx-deprecated-deleted/
